<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literature Tools Catalog</title>
    <!-- We will load sql.js-httpvfs via ES modules below -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        #loading {
            margin-top: 20px;
            font-weight: bold;
            color: #555;
        }
        #error {
            margin-top: 20px;
            font-weight: bold;
            color: red;
        }
        #results-info {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Literature Tools Catalog</h1>
    <p>Search by PMID, PMCID, or DOI. This database is loaded on demand and queried directly in your browser using WebAssembly.</p>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Enter PMID, PMCID, or DOI..." disabled>
        <button id="searchButton" onclick="performSearch()" disabled>Search</button>
    </div>

    <div id="loading">Initializing database, please wait...</div>
    <div id="error"></div>
    <div id="results-info"></div>

    <table id="resultsTable" style="display: none;">
        <thead>
            <tr>
                <th>ID</th>
                <th>PMID</th>
                <th>PMCID</th>
                <th>DOI</th>
            </tr>
        </thead>
        <tbody>
            <!-- Results will be injected here -->
        </tbody>
    </table>

    <script type="module">
        import { createDbWorker } from "https://cdn.jsdelivr.net/npm/sql.js-httpvfs@0.8.12/dist/index.js";

        let worker;

        const workerUrl = new URL(
            "https://cdn.jsdelivr.net/npm/sql.js-httpvfs@0.8.12/dist/sqlite.worker.js"
        );
        const wasmUrl = new URL(
            "https://cdn.jsdelivr.net/npm/sql.js-httpvfs@0.8.12/dist/sql-wasm.wasm"
        );

        async function initDB() {
            const loadingIndicator = document.getElementById('loading');
            const errorIndicator = document.getElementById('error');
            const searchInput = document.getElementById('searchInput');
            const searchButton = document.getElementById('searchButton');

            try {
                loadingIndicator.innerText = "Initializing remote database connection...";

                const config = {
                    from: "inline",
                    config: {
                        serverMode: "full",
                        requestChunkSize: 1024,
                        url: "catalog.db"
                    }
                };

                worker = await createDbWorker(
                    [config],
                    workerUrl.toString(),
                    wasmUrl.toString()
                );

                // Ready
                loadingIndicator.style.display = 'none';
                searchInput.disabled = false;
                searchButton.disabled = false;
                searchInput.focus();

                // Initial empty search to show some records
                performSearch();

            } catch (err) {
                console.error(err);
                loadingIndicator.style.display = 'none';
                errorIndicator.innerText = `Error initializing database: ${err.message}`;
            }
        }

        // Allow pressing Enter in the search box
        document.getElementById("searchInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                performSearch();
            }
        });

        // Search button click
        document.getElementById("searchButton").addEventListener("click", performSearch);

        async function performSearch() {
            if (!worker) return;

            const queryText = document.getElementById('searchInput').value.trim();
            const tbody = document.querySelector('#resultsTable tbody');
            const table = document.getElementById('resultsTable');
            const info = document.getElementById('results-info');

            tbody.innerHTML = ''; // Clear previous results
            table.style.display = 'none';
            info.innerText = 'Searching...';

            try {
                let sqlQuery = "";
                let params = [];
                const limit = 50;

                if (queryText === "") {
                    // Show top N records if no search query
                    sqlQuery = "SELECT id, pmid, pmcid, doi FROM literature LIMIT ?";
                    params = [limit];
                } else {
                    // Search in any column
                    sqlQuery = "SELECT id, pmid, pmcid, doi FROM literature WHERE pmid LIKE ? OR pmcid LIKE ? OR doi LIKE ? LIMIT ?";
                    const searchPattern = `%${queryText}%`;
                    params = [searchPattern, searchPattern, searchPattern, limit];
                }

                // worker.db.exec returns an array of results, just like sql.js
                // It returns an array of objects: { columns: [...], values: [[...], [...]] }
                const results = await worker.db.exec(sqlQuery, params);
                let count = 0;

                if (results.length > 0) {
                    const columns = results[0].columns;
                    const values = results[0].values;

                    for (const rowVals of values) {
                        const row = {};
                        for (let i = 0; i < columns.length; i++) {
                            row[columns[i]] = rowVals[i];
                        }

                        const tr = document.createElement('tr');
                        const idTd = document.createElement('td');
                        idTd.textContent = row.id;

                        const pmidTd = document.createElement('td');
                        pmidTd.textContent = row.pmid || '';

                        const pmcidTd = document.createElement('td');
                        pmcidTd.textContent = row.pmcid || '';

                        const doiTd = document.createElement('td');
                        if (row.doi) {
                            const a = document.createElement('a');
                            a.href = row.doi;
                            a.target = "_blank";
                            a.textContent = row.doi;
                            doiTd.appendChild(a);
                        }

                        tr.appendChild(idTd);
                        tr.appendChild(pmidTd);
                        tr.appendChild(pmcidTd);
                        tr.appendChild(doiTd);

                        tbody.appendChild(tr);
                        count++;
                    }
                }

                if (count > 0) {
                    table.style.display = 'table';
                    info.innerText = `Showing ${count} results${count === limit ? ' (limited)' : ''}.`;
                } else {
                    info.innerText = "No results found.";
                }

            } catch (err) {
                console.error(err);
                info.innerText = `Search error: ${err.message}`;
            }
        }

        // Initialize when the page loads
        window.onload = initDB;
    </script>
</body>
</html>
