<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literature Tools Catalog</title>
    <!-- We will load sql.js-httpvfs via ES modules below -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        #loading {
            margin-top: 20px;
            font-weight: bold;
            color: #555;
        }
        #error {
            margin-top: 20px;
            font-weight: bold;
            color: red;
        }
        #results-info {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
        #pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Literature Tools Catalog</h1>
    <p>Search by PMID, PMCID, or DOI. This database is loaded on demand and queried directly in your browser using WebAssembly.</p>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Enter PMID, PMCID, or DOI..." disabled>
        <button id="searchButton" onclick="performSearch(true)" disabled>Search</button>
    </div>

    <div id="loading">Initializing database, please wait...</div>
    <div id="error"></div>
    <div id="results-info"></div>

    <table id="resultsTable" style="display: none;">
        <thead>
            <tr>
                <th>ID</th>
                <th>PMID</th>
                <th>PMCID</th>
                <th>DOI</th>
            </tr>
        </thead>
        <tbody>
            <!-- Results will be injected here -->
        </tbody>
    </table>

    <div id="pagination" style="display: none;">
        <button id="prevButton" onclick="changePage(-1)" disabled>Previous</button>
        <span id="pageInfo">Page 1</span>
        <button id="nextButton" onclick="changePage(1)" disabled>Next</button>
    </div>

    <script type="module">
        import { createDbWorker } from "https://cdn.jsdelivr.net/npm/sql.js-httpvfs@0.8.12/dist/index.js";

        let worker;
        let currentPage = 1;
        const limit = 50;

        const workerUrl = new URL(
            "https://cdn.jsdelivr.net/npm/sql.js-httpvfs@0.8.12/dist/sqlite.worker.js"
        );
        const wasmUrl = new URL(
            "https://cdn.jsdelivr.net/npm/sql.js-httpvfs@0.8.12/dist/sql-wasm.wasm"
        );

        window.changePage = function(delta) {
            currentPage += delta;
            window.performSearch(false);
        };

        async function initDB() {
            const loadingIndicator = document.getElementById('loading');
            const errorIndicator = document.getElementById('error');
            const searchInput = document.getElementById('searchInput');
            const searchButton = document.getElementById('searchButton');

            try {
                loadingIndicator.innerText = "Initializing remote database connection...";

                const config = {
                    from: "inline",
                    config: {
                        serverMode: "full",
                        requestChunkSize: 1024,
                        url: "catalog.db"
                    }
                };

                worker = await createDbWorker(
                    [config],
                    workerUrl.toString(),
                    wasmUrl.toString()
                );

                // Ready
                loadingIndicator.style.display = 'none';
                searchInput.disabled = false;
                searchButton.disabled = false;
                searchInput.focus();

                // Initial empty search to show some records
                window.performSearch(true);

            } catch (err) {
                console.error(err);
                loadingIndicator.style.display = 'none';
                errorIndicator.innerText = `Error initializing database: ${err.message}`;
            }
        }

        // Allow pressing Enter in the search box
        document.getElementById("searchInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                window.performSearch(true);
            }
        });

        // Expose performSearch to global scope for the buttons
        window.performSearch = async function(resetPage = false) {
            if (!worker) return;

            if (resetPage) {
                currentPage = 1;
            }

            if (resetPage) {
                currentPage = 1;
            }

            const queryText = document.getElementById('searchInput').value.trim();
            const tbody = document.querySelector('#resultsTable tbody');
            const table = document.getElementById('resultsTable');
            const info = document.getElementById('results-info');
            const pagination = document.getElementById('pagination');
            const prevButton = document.getElementById('prevButton');
            const nextButton = document.getElementById('nextButton');
            const pageInfo = document.getElementById('pageInfo');

            tbody.innerHTML = ''; // Clear previous results
            table.style.display = 'none';
            pagination.style.display = 'none';
            info.innerText = 'Searching...';

            try {
                let sqlQuery = "";
                let countQuery = "";
                let params = [];
                let countParams = [];
                let totalRecords = 0;
                const offset = (currentPage - 1) * limit;

                if (queryText === "") {
                    // Count total records
                    countQuery = "SELECT COUNT(*) as count FROM literature";

                    // Show records with pagination
                    sqlQuery = "SELECT id, pmid, pmcid, doi FROM literature LIMIT ? OFFSET ?";
                    params = [limit, offset];
                } else {
                    const searchPattern = `%${queryText}%`;

                    // Count total records for search
                    countQuery = "SELECT COUNT(*) as count FROM literature WHERE pmid LIKE ? OR pmcid LIKE ? OR doi LIKE ?";
                    countParams = [searchPattern, searchPattern, searchPattern];

                    // Search in any column with pagination
                    sqlQuery = "SELECT id, pmid, pmcid, doi FROM literature WHERE pmid LIKE ? OR pmcid LIKE ? OR doi LIKE ? LIMIT ? OFFSET ?";
                    params = [searchPattern, searchPattern, searchPattern, limit, offset];
                }

                // worker.db.exec returns an array of results
                const countResults = await worker.db.exec(countQuery, countParams);
                if (countResults.length > 0) {
                    totalRecords = countResults[0].values[0][0];
                }

                const results = await worker.db.exec(sqlQuery, params);
                let count = 0;

                if (results.length > 0) {
                    const columns = results[0].columns;
                    const values = results[0].values;

                    for (const rowVals of values) {
                        const row = {};
                        for (let i = 0; i < columns.length; i++) {
                            row[columns[i]] = rowVals[i];
                        }

                        const tr = document.createElement('tr');

                        const tdId = document.createElement('td');
                        tdId.textContent = row.id;
                        tr.appendChild(tdId);

                        const tdPmid = document.createElement('td');
                        tdPmid.textContent = row.pmid || '';
                        tr.appendChild(tdPmid);

                        const tdPmcid = document.createElement('td');
                        tdPmcid.textContent = row.pmcid || '';
                        tr.appendChild(tdPmcid);

                        const tdDoi = document.createElement('td');
                        if (row.doi) {
                            const a = document.createElement('a');
                            a.href = row.doi;
                            a.target = "_blank";
                            a.textContent = row.doi;
                            tdDoi.appendChild(a);
                        }
                        tr.appendChild(tdDoi);

                        tbody.appendChild(tr);
                        count++;
                    }
                }

                if (totalRecords > 0) {
                    table.style.display = 'table';

                    const totalPages = Math.ceil(totalRecords / limit);
                    info.innerText = `Showing ${offset + 1} to ${Math.min(offset + limit, totalRecords)} of ${totalRecords} results.`;

                    if (totalPages > 1) {
                        pagination.style.display = 'flex';
                        pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
                        prevButton.disabled = currentPage === 1;
                        nextButton.disabled = currentPage === totalPages;
                    }
                } else {
                    info.innerText = "No results found.";
                }

            } catch (err) {
                console.error(err);
                info.innerText = `Search error: ${err.message}`;
            }
        };

        function changePage(delta) {
            currentPage += delta;
            performSearch(false);
        }

        // Initialize when the page loads
        window.onload = initDB;
    </script>
</body>
</html>
