<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literature Tools Catalog</title>
    <!-- Use sql.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        #loading {
            margin-top: 20px;
            font-weight: bold;
            color: #555;
        }
        #error {
            margin-top: 20px;
            font-weight: bold;
            color: red;
        }
        #results-info {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Literature Tools Catalog</h1>
    <p>Search by PMID, PMCID, or DOI. This database is loaded on demand and queried directly in your browser using WebAssembly.</p>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Enter PMID, PMCID, or DOI..." disabled>
        <button id="searchButton" disabled>Search</button>
    </div>

    <style>
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .pagination button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            background-color: #6c757d;
        }
        .pagination button:hover {
            background-color: #5a6268;
        }
        .pagination button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>

    <div id="loading">Initializing database, please wait...</div>
    <div id="error"></div>
    <div id="results-info"></div>

    <div class="pagination" id="topPagination" style="display: none;">
        <button id="prevBtnTop" onclick="prevPage()">Previous</button>
        <span id="pageInfoTop">Page 1</span>
        <button id="nextBtnTop" onclick="nextPage()">Next</button>
    </div>

    <table id="resultsTable" style="display: none;">
        <thead>
            <tr>
                <th>ID</th>
                <th>PMID</th>
                <th>PMCID</th>
                <th>DOI</th>
            </tr>
        </thead>
        <tbody>
            <!-- Results will be injected here -->
        </tbody>
    </table>

    <div class="pagination" id="bottomPagination" style="display: none;">
        <button id="prevBtnBottom" onclick="prevPage()">Previous</button>
        <span id="pageInfoBottom">Page 1</span>
        <button id="nextBtnBottom" onclick="nextPage()">Next</button>
    </div>

    <script>
        let db;
        let currentPage = 1;
        const pageSize = 50;
        let totalResults = 0;
        let currentSearchQuery = "";

        async function initDB() {
            const loadingIndicator = document.getElementById('loading');
            const errorIndicator = document.getElementById('error');
            const searchInput = document.getElementById('searchInput');
            const searchButton = document.getElementById('searchButton');

            try {
                // Initialize sql.js
                const SQL = await initSqlJs({
                    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
                });

                // Fetch the SQLite database file
                loadingIndicator.innerText = "Downloading database... (this might take a moment depending on the size)";
                const response = await fetch('catalog.db');
                if (!response.ok) {
                    throw new Error(`Failed to fetch database: ${response.statusText}`);
                }

                const buffer = await response.arrayBuffer();
                loadingIndicator.innerText = "Loading database into memory...";

                // Initialize the database
                db = new SQL.Database(new Uint8Array(buffer));

                // Ready
                loadingIndicator.style.display = 'none';
                searchInput.disabled = false;
                searchButton.disabled = false;
                searchInput.focus();

                // Initial empty search to show some records
                performSearch();

            } catch (err) {
                console.error(err);
                loadingIndicator.style.display = 'none';
                errorIndicator.innerText = `Error initializing database: ${err.message}`;
            }
        }

        // Allow pressing Enter in the search box
        document.getElementById("searchInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                // Reset page on new search
                currentPage = 1;
                currentSearchQuery = document.getElementById('searchInput').value.trim();
                executeSearch();
            }
        });

        // Triggered by the search button
        document.getElementById("searchButton").onclick = () => {
            currentPage = 1;
            currentSearchQuery = document.getElementById('searchInput').value.trim();
            executeSearch();
        };

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                executeSearch();
            }
        }

        function nextPage() {
            if ((currentPage * pageSize) < totalResults) {
                currentPage++;
                executeSearch();
            }
        }

        function updatePaginationUI() {
            const topPagination = document.getElementById('topPagination');
            const bottomPagination = document.getElementById('bottomPagination');
            const pageInfoTop = document.getElementById('pageInfoTop');
            const pageInfoBottom = document.getElementById('pageInfoBottom');
            const prevBtnTop = document.getElementById('prevBtnTop');
            const prevBtnBottom = document.getElementById('prevBtnBottom');
            const nextBtnTop = document.getElementById('nextBtnTop');
            const nextBtnBottom = document.getElementById('nextBtnBottom');

            if (totalResults > 0) {
                topPagination.style.display = 'flex';
                bottomPagination.style.display = 'flex';

                const totalPages = Math.ceil(totalResults / pageSize);
                const infoText = `Page ${currentPage} of ${totalPages} (${totalResults.toLocaleString()} total entries)`;

                pageInfoTop.innerText = infoText;
                pageInfoBottom.innerText = infoText;

                const disablePrev = currentPage === 1;
                const disableNext = currentPage >= totalPages;

                prevBtnTop.disabled = disablePrev;
                prevBtnBottom.disabled = disablePrev;
                nextBtnTop.disabled = disableNext;
                nextBtnBottom.disabled = disableNext;
            } else {
                topPagination.style.display = 'none';
                bottomPagination.style.display = 'none';
            }
        }

        // Renamed to executeSearch to clarify it uses existing state
        function executeSearch() {
            if (!db) return;

            const tbody = document.querySelector('#resultsTable tbody');
            const table = document.getElementById('resultsTable');
            const info = document.getElementById('results-info');

            tbody.innerHTML = ''; // Clear previous results
            table.style.display = 'none';
            info.innerText = 'Searching...';
            document.getElementById('topPagination').style.display = 'none';
            document.getElementById('bottomPagination').style.display = 'none';

            try {
                let sqlQuery = "";
                let countQuery = "";
                let stmt;
                let countStmt;
                const offset = (currentPage - 1) * pageSize;

                if (currentSearchQuery === "") {
                    // Total count
                    countQuery = "SELECT COUNT(*) as count FROM literature";
                    countStmt = db.prepare(countQuery);

                    // Results
                    sqlQuery = "SELECT id, pmid, pmcid, doi FROM literature LIMIT ? OFFSET ?";
                    stmt = db.prepare(sqlQuery);
                    stmt.bind([pageSize, offset]);
                } else {
                    const searchPattern = `%${currentSearchQuery}%`;

                    // Total count
                    countQuery = "SELECT COUNT(*) as count FROM literature WHERE pmid LIKE ? OR pmcid LIKE ? OR doi LIKE ?";
                    countStmt = db.prepare(countQuery);
                    countStmt.bind([searchPattern, searchPattern, searchPattern]);

                    // Results
                    sqlQuery = "SELECT id, pmid, pmcid, doi FROM literature WHERE pmid LIKE ? OR pmcid LIKE ? OR doi LIKE ? LIMIT ? OFFSET ?";
                    stmt = db.prepare(sqlQuery);
                    stmt.bind([searchPattern, searchPattern, searchPattern, pageSize, offset]);
                }

                // Execute count
                if (countStmt.step()) {
                    totalResults = countStmt.getAsObject().count;
                }
                countStmt.free();

                let count = 0;
                while (stmt.step()) {
                    const row = stmt.getAsObject();
                    const tr = document.createElement('tr');

                    const tdId = document.createElement('td');
                    tdId.textContent = row.id;
                    tr.appendChild(tdId);

                    const tdPmid = document.createElement('td');
                    tdPmid.textContent = row.pmid || '';
                    tr.appendChild(tdPmid);

                    const tdPmcid = document.createElement('td');
                    tdPmcid.textContent = row.pmcid || '';
                    tr.appendChild(tdPmcid);

                    const tdDoi = document.createElement('td');
                    if (row.doi) {
                        const a = document.createElement('a');
                        a.href = row.doi;
                        a.target = '_blank';
                        a.textContent = row.doi;
                        tdDoi.appendChild(a);
                    }
                    tr.appendChild(tdDoi);

                    tbody.appendChild(tr);
                    count++;
                }
                stmt.free();

                if (count > 0) {
                    table.style.display = 'table';
                    const startRange = offset + 1;
                    const endRange = offset + count;
                    info.innerText = `Showing results ${startRange} - ${endRange} out of ${totalResults.toLocaleString()}.`;
                    updatePaginationUI();
                } else {
                    info.innerText = "No results found.";
                    totalResults = 0;
                    updatePaginationUI();
                }

            } catch (err) {
                console.error(err);
                info.innerText = `Search error: ${err.message}`;
            }
        }

        // Initialize when the page loads
        // performSearch was called directly before, we use executeSearch now
        function performSearch() {
            currentSearchQuery = document.getElementById('searchInput').value.trim();
            currentPage = 1;
            executeSearch();
        }
        window.onload = initDB;
    </script>
</body>
</html>
